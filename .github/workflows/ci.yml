name: CI

on:
  push:
    branches: [main, "v0.*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build+test (${{ matrix.cc }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - { cc: gcc,   cxx: g++ }
          - { cc: clang, cxx: clang++ }
    env:
      # Cache the FetchContent clones (Eigen + Sophus) outside build/ so a fresh
      # configure never re-clones gitlab.com / github.com after the first run.
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.deps-cache
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ${{ matrix.cc }}

      - name: Cache FetchContent deps (Eigen + Sophus)
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.deps-cache
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_C_COMPILER=${{ matrix.cc }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

  strict:
    name: strict warnings (gcc -Werror)
    runs-on: ubuntu-24.04
    # Required check as of v0.2 close-out (issues #2-#12 stabilized).
    env:
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.deps-cache
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++
      - uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.deps-cache
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-
      - name: Configure (strict)
        run: cmake -S . -B build-strict -G Ninja -DCALIBFORGE_WERROR=ON
      - name: Build
        run: cmake --build build-strict -j
      - name: Test
        run: ctest --test-dir build-strict --output-on-failure

  config-only:
    name: host-only config proof (no nvcc)
    runs-on: ubuntu-24.04
    env:
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.deps-cache
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++
      - uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.deps-cache
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-
      - name: Configure and assert the CUDA path degrades to HOST-ONLY
        run: |
          cmake -S . -B build-cfg -G Ninja 2>&1 | tee cfg.log
          grep -q "configuring HOST-ONLY" cfg.log
          test ! -e build-cfg/calibforge_arch_probe

  python:
    name: python bindings (pybind11 + pytest)
    runs-on: ubuntu-24.04
    env:
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.deps-cache
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++ python3-dev python3-pip
      - run: python3 -m pip install --break-system-packages pytest numpy
      - uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.deps-cache
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-
      - name: Configure with Python bindings (strict)
        run: cmake -S . -B build-py -G Ninja -DCALIBFORGE_PYTHON=ON -DCALIBFORGE_WERROR=ON
      - name: Build the calibforge module
        run: cmake --build build-py --target calibforge_python -j
      - name: pytest
        run: ctest --test-dir build-py -R calibforge_python --output-on-failure

  opencv:
    name: opencv-gated tests (OpenCV interop + ChArUco/AprilGrid)
    runs-on: ubuntu-24.04
    env:
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.deps-cache
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain + OpenCV (libopencv-dev brings calib3d + aruco)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ libopencv-dev
      - uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.deps-cache
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-
      - name: Configure with OpenCV
        # NOTE: intentionally NOT -DCALIBFORGE_WERROR=ON. The aruco tests call
        # cv::aruco::CharucoBoard/GridBoard::create + board->draw, which are deprecated in
        # newer OpenCV; -Wdeprecated-declarations fires at the call site (SYSTEM includes do
        # not suppress that) and would break the build if the runner's OpenCV bumps past 4.6.
        # Re-enable once those wrappers move to the non-deprecated aruco API.
        run: |
          cmake -S . -B build-ocv -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo 2>&1 | tee cfg.log
          grep -qE "OpenCV [0-9].* found" cfg.log
      - name: Build the OpenCV-gated tests
        run: cmake --build build-ocv --target calibforge_opencv_tests -j
      - name: Run the gated tests (proves ChArUco/AprilGrid end-to-end)
        run: ctest --test-dir build-ocv -R calibforge_opencv_tests --output-on-failure
